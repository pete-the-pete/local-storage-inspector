<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4FF" />
      <stop offset="100%" stop-color="#E8EEFF" />
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg5)" />

  <!-- Panel -->
  <g transform="translate(240, 60)">
    <rect width="800" height="680" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 24px rgba(0,0,0,0.12))" />

    <!-- Header -->
    <rect width="800" height="48" rx="12" fill="#FFFFFF" />
    <rect y="36" width="800" height="12" fill="#FFFFFF" />
    <line x1="0" y1="48" x2="800" y2="48" stroke="#E0E0E0" stroke-width="1" />

    <!-- Toggle -->
    <rect x="12" y="12" width="60" height="26" rx="4" fill="#3B82F6" />
    <text x="42" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Local</text>
    <rect x="76" y="12" width="70" height="26" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" />
    <text x="111" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Session</text>

    <!-- Search -->
    <rect x="156" y="12" width="632" height="26" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1" />

    <!-- Keys list (compact) -->
    <rect x="0" y="48" width="180" height="540" fill="#FAFAFA" />
    <text x="16" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#3B82F6" font-weight="500">+ Add new key</text>
    <g font-family="system-ui, sans-serif" font-size="12" fill="#333">
      <text x="16" y="101">user-settings</text>
      <text x="16" y="131">auth-token</text>
      <text x="16" y="161">theme-preference</text>
      <text x="16" y="191">cart-items</text>
      <text x="16" y="221">last-visited</text>
      <text x="16" y="251">notifications</text>
      <text x="16" y="281">feature-flags</text>
    </g>
    <line x1="180" y1="48" x2="180" y2="588" stroke="#E0E0E0" stroke-width="1" />

    <!-- No selection state -->
    <text x="490" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#999">Select a key to edit</text>

    <!-- Import/Export bar - highlighted -->
    <rect x="0" y="588" width="800" height="44" fill="#FFF8E1" />
    <line x1="0" y1="588" x2="800" y2="588" stroke="#E0E0E0" stroke-width="1" />
    <rect x="12" y="598" width="60" height="26" rx="4" fill="#FFF" stroke="#D1D5DB" stroke-width="1" />
    <text x="42" y="615" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333">Export</text>
    <rect x="80" y="598" width="60" height="26" rx="4" fill="#FFF" stroke="#D1D5DB" stroke-width="1" />
    <text x="110" y="615" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333">Import</text>

    <!-- Recording -->
    <rect x="0" y="632" width="800" height="48" rx="0" fill="#F8F8F8" />
    <rect x="0" y="668" width="800" height="12" rx="12" fill="#F8F8F8" />
    <circle cx="24" cy="652" r="4" fill="#D32F2F" />
    <text x="36" y="656" font-family="system-ui, sans-serif" font-size="11" fill="#333">Recording</text>
  </g>

  <!-- JSON file floating card -->
  <g transform="translate(660, 180)">
    <rect width="320" height="300" rx="8" fill="#282C34" filter="drop-shadow(0 8px 32px rgba(0,0,0,0.25))" />
    <rect width="320" height="28" rx="8" fill="#21252B" />
    <rect y="20" width="320" height="8" fill="#21252B" />
    <text x="12" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#999">storage-backup.json</text>

    <g font-family="'SF Mono', monospace" font-size="11" transform="translate(12, 44)">
      <text y="0" fill="#ABB2BF">{</text>
      <text y="18" x="12" fill="#E06C75">"user-settings"</text><text y="18" x="130" fill="#ABB2BF">: {</text>
      <text y="36" x="24" fill="#E06C75">"language"</text><text y="36" x="100" fill="#ABB2BF">: </text><text y="36" x="112" fill="#98C379">"en"</text><text y="36" x="136" fill="#ABB2BF">,</text>
      <text y="54" x="24" fill="#E06C75">"theme"</text><text y="54" x="82" fill="#ABB2BF">: </text><text y="54" x="94" fill="#98C379">"dark"</text>
      <text y="72" x="12" fill="#ABB2BF">},</text>
      <text y="90" x="12" fill="#E06C75">"auth-token"</text><text y="90" x="108" fill="#ABB2BF">: </text><text y="90" x="120" fill="#98C379">"eyJhbG..."</text><text y="90" x="204" fill="#ABB2BF">,</text>
      <text y="108" x="12" fill="#E06C75">"cart-items"</text><text y="108" x="108" fill="#ABB2BF">: </text><text y="108" x="120" fill="#98C379">"[{...}]"</text><text y="108" x="180" fill="#ABB2BF">,</text>
      <text y="126" x="12" fill="#E06C75">"theme-preference"</text><text y="126" x="156" fill="#ABB2BF">: </text><text y="126" x="168" fill="#98C379">"dark"</text><text y="126" x="204" fill="#ABB2BF">,</text>
      <text y="144" x="12" fill="#E06C75">"notifications"</text><text y="144" x="132" fill="#ABB2BF">: </text><text y="144" x="144" fill="#98C379">"{...}"</text><text y="144" x="192" fill="#ABB2BF">,</text>
      <text y="162" x="12" fill="#E06C75">"feature-flags"</text><text y="162" x="132" fill="#ABB2BF">: </text><text y="162" x="144" fill="#98C379">"{...}"</text>
      <text y="180" fill="#ABB2BF">}</text>
    </g>
  </g>

  <!-- Arrow from file to import -->
  <g>
    <path d="M 720 490 Q 600 540 580 598" stroke="#3B82F6" stroke-width="2" fill="none" stroke-dasharray="6 3" />
    <circle cx="580" cy="598" r="4" fill="#3B82F6" />
  </g>

  <!-- Feature callout -->
  <g transform="translate(40, 300)">
    <rect width="180" height="100" rx="8" fill="#1E3A5F" opacity="0.95" />
    <text x="16" y="28" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Import / Export</text>
    <text x="16" y="50" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Export all entries as JSON</text>
    <text x="16" y="66" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Import from file</text>
    <text x="16" y="82" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Clear before import option</text>
  </g>
</svg>
