<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4FF" />
      <stop offset="100%" stop-color="#E8EEFF" />
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg2)" />

  <!-- Zoomed editor panel -->
  <g transform="translate(240, 40)">
    <rect width="800" height="720" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 24px rgba(0,0,0,0.12))" />

    <!-- Editor toolbar -->
    <rect width="800" height="44" rx="12" fill="#FAFAFA" />
    <rect y="32" width="800" height="12" fill="#FAFAFA" />
    <line x1="0" y1="44" x2="800" y2="44" stroke="#E0E0E0" stroke-width="1" />

    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333">user-settings</text>

    <!-- JSON toggle checked -->
    <rect x="540" y="12" width="14" height="14" rx="2" fill="#3B82F6" />
    <text x="560" y="24" font-family="system-ui, sans-serif" font-size="12" fill="#333">JSON</text>

    <rect x="604" y="10" width="48" height="24" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" />
    <text x="628" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333">Copy</text>
    <rect x="658" y="10" width="48" height="24" rx="4" fill="#22C55E" />
    <text x="682" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Save</text>
    <rect x="712" y="10" width="56" height="24" rx="4" fill="#FFF" stroke="#EF4444" stroke-width="1" />
    <text x="740" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#EF4444">Delete</text>

    <!-- Code editor (One Dark theme, larger) -->
    <rect x="0" y="44" width="800" height="640" rx="0" fill="#282C34" />

    <!-- Line numbers -->
    <g font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#636D83">
      <text x="24" y="74" text-anchor="end">1</text>
      <text x="24" y="98" text-anchor="end">2</text>
      <text x="24" y="122" text-anchor="end">3</text>
      <text x="24" y="146" text-anchor="end">4</text>
      <text x="24" y="170" text-anchor="end">5</text>
      <text x="24" y="194" text-anchor="end">6</text>
      <text x="24" y="218" text-anchor="end">7</text>
      <text x="24" y="242" text-anchor="end">8</text>
      <text x="24" y="266" text-anchor="end">9</text>
      <text x="24" y="290" text-anchor="end">10</text>
      <text x="24" y="314" text-anchor="end">11</text>
      <text x="24" y="338" text-anchor="end">12</text>
      <text x="24" y="362" text-anchor="end">13</text>
      <text x="24" y="386" text-anchor="end">14</text>
      <text x="24" y="410" text-anchor="end">15</text>
      <text x="24" y="434" text-anchor="end">16</text>
    </g>

    <!-- Gutter line -->
    <line x1="36" y1="44" x2="36" y2="684" stroke="#3B4048" stroke-width="1" />

    <!-- JSON content -->
    <g font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <text x="48" y="74" fill="#ABB2BF">{</text>
      <text x="68" y="98" fill="#E06C75">"language"</text><text x="155" y="98" fill="#ABB2BF">: </text><text x="170" y="98" fill="#98C379">"en"</text><text x="200" y="98" fill="#ABB2BF">,</text>
      <text x="68" y="122" fill="#E06C75">"timezone"</text><text x="155" y="122" fill="#ABB2BF">: </text><text x="170" y="122" fill="#98C379">"America/New_York"</text><text x="335" y="122" fill="#ABB2BF">,</text>
      <text x="68" y="146" fill="#E06C75">"theme"</text><text x="130" y="146" fill="#ABB2BF">: </text><text x="145" y="146" fill="#98C379">"dark"</text><text x="188" y="146" fill="#ABB2BF">,</text>
      <text x="68" y="170" fill="#E06C75">"notifications"</text><text x="195" y="170" fill="#ABB2BF">: {</text>
      <text x="88" y="194" fill="#E06C75">"email"</text><text x="142" y="194" fill="#ABB2BF">: </text><text x="157" y="194" fill="#D19A66">true</text><text x="190" y="194" fill="#ABB2BF">,</text>
      <text x="88" y="218" fill="#E06C75">"push"</text><text x="135" y="218" fill="#ABB2BF">: </text><text x="150" y="218" fill="#D19A66">false</text><text x="192" y="218" fill="#ABB2BF">,</text>
      <text x="88" y="242" fill="#E06C75">"sms"</text><text x="125" y="242" fill="#ABB2BF">: </text><text x="140" y="242" fill="#D19A66">true</text>
      <text x="68" y="266" fill="#ABB2BF">},</text>
      <text x="68" y="290" fill="#E06C75">"sidebar"</text><text x="145" y="290" fill="#ABB2BF">: {</text>
      <text x="88" y="314" fill="#E06C75">"width"</text><text x="142" y="314" fill="#ABB2BF">: </text><text x="157" y="314" fill="#D19A66">280</text><text x="182" y="314" fill="#ABB2BF">,</text>
      <text x="88" y="338" fill="#E06C75">"collapsed"</text><text x="180" y="338" fill="#ABB2BF">: </text><text x="195" y="338" fill="#D19A66">false</text><text x="237" y="338" fill="#ABB2BF">,</text>
      <text x="88" y="362" fill="#E06C75">"pinned"</text><text x="153" y="362" fill="#ABB2BF">: </text><text x="168" y="362" fill="#D19A66">true</text>
      <text x="68" y="386" fill="#ABB2BF">},</text>
      <text x="68" y="410" fill="#E06C75">"lastLogin"</text><text x="162" y="410" fill="#ABB2BF">: </text><text x="177" y="410" fill="#98C379">"2026-04-01T14:30:00Z"</text>
      <text x="48" y="434" fill="#ABB2BF">}</text>
    </g>

    <!-- Cursor line highlight -->
    <rect x="0" y="130" width="800" height="24" fill="#2C313A" opacity="0.5" />
  </g>

  <!-- Feature callout -->
  <g transform="translate(40, 300)">
    <rect width="180" height="100" rx="8" fill="#1E3A5F" opacity="0.95" />
    <text x="16" y="28" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">JSON Editor</text>
    <text x="16" y="50" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">One Dark syntax theme</text>
    <text x="16" y="66" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Real-time validation</text>
    <text x="16" y="82" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Bracket matching</text>
  </g>
</svg>
