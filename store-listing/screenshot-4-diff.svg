<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4FF" />
      <stop offset="100%" stop-color="#E8EEFF" />
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg4)" />

  <!-- Diff panel -->
  <g transform="translate(240, 40)">
    <rect width="800" height="720" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 24px rgba(0,0,0,0.12))" />

    <!-- Entry header -->
    <rect width="800" height="36" rx="12" fill="#FAFAFA" />
    <rect y="24" width="800" height="12" fill="#FAFAFA" />
    <text x="16" y="24" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#333">user-settings</text>
    <text x="130" y="24" font-family="system-ui, sans-serif" font-size="11" fill="#666">setItem</text>
    <rect x="178" y="10" width="32" height="16" rx="3" fill="#E8E8E8" />
    <text x="194" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">page</text>
    <text x="720" y="24" font-family="system-ui, sans-serif" font-size="11" fill="#999">14:32:01.158</text>

    <!-- Summary line -->
    <text x="16" y="52" font-family="'SF Mono', monospace" font-size="11" fill="#888">~ theme, + sidebar.pinned</text>

    <!-- Diff mode toggle -->
    <rect x="16" y="64" width="48" height="22" rx="3" fill="#E0E0E0" />
    <text x="40" y="79" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#333">Inline</text>
    <rect x="68" y="64" width="56" height="22" rx="3" fill="#FFF" stroke="#CCC" stroke-width="1" />
    <text x="96" y="79" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#333">Unified</text>

    <!-- OLD label -->
    <text x="16" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#999" text-transform="uppercase" letter-spacing="0.5">OLD</text>

    <!-- Old value block -->
    <rect x="16" y="116" width="768" height="240" rx="4" fill="#F5F5F5" />
    <g font-family="'SF Mono', monospace" font-size="12">
      <text x="28" y="136" fill="#333">{</text>
      <text x="44" y="156" fill="#333">"language": "en",</text>
      <text x="44" y="176" fill="#333">"timezone": "America/New_York",</text>
      <!-- Removed line - pink background -->
      <rect x="16" y="182" width="768" height="20" fill="#FCE4EC" rx="0" />
      <text x="44" y="196" fill="#333">"theme": "light",</text>
      <text x="44" y="216" fill="#333">"notifications": {</text>
      <text x="64" y="236" fill="#333">"email": true,</text>
      <text x="64" y="256" fill="#333">"push": false</text>
      <text x="44" y="276" fill="#333">},</text>
      <text x="44" y="296" fill="#333">"sidebar": {</text>
      <text x="64" y="316" fill="#333">"width": 280,</text>
      <text x="64" y="336" fill="#333">"collapsed": false</text>
      <text x="44" y="340" fill="#333">}</text>
    </g>

    <!-- NEW label -->
    <text x="16" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#999" text-transform="uppercase" letter-spacing="0.5">NEW</text>

    <!-- New value block -->
    <rect x="16" y="384" width="768" height="280" rx="4" fill="#F5F5F5" />
    <g font-family="'SF Mono', monospace" font-size="12">
      <text x="28" y="404" fill="#333">{</text>
      <text x="44" y="424" fill="#333">"language": "en",</text>
      <text x="44" y="444" fill="#333">"timezone": "America/New_York",</text>
      <!-- Added line - blue background -->
      <rect x="16" y="450" width="768" height="20" fill="#E3F2FD" rx="0" />
      <text x="44" y="464" fill="#333">"theme": "dark",</text>
      <text x="44" y="484" fill="#333">"notifications": {</text>
      <text x="64" y="504" fill="#333">"email": true,</text>
      <text x="64" y="524" fill="#333">"push": false</text>
      <text x="44" y="544" fill="#333">},</text>
      <text x="44" y="564" fill="#333">"sidebar": {</text>
      <text x="64" y="584" fill="#333">"width": 280,</text>
      <text x="64" y="604" fill="#333">"collapsed": false,</text>
      <!-- Added line - blue background -->
      <rect x="16" y="610" width="768" height="20" fill="#E3F2FD" rx="0" />
      <text x="64" y="624" fill="#333">"pinned": true</text>
      <text x="44" y="644" fill="#333">}</text>
      <text x="28" y="654" fill="#333">}</text>
    </g>
  </g>

  <!-- Feature callout -->
  <g transform="translate(40, 300)">
    <rect width="180" height="100" rx="8" fill="#1E3A5F" opacity="0.95" />
    <text x="16" y="28" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Diff View</text>
    <text x="16" y="50" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Inline or unified mode</text>
    <text x="16" y="66" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Color-coded changes</text>
    <text x="16" y="82" font-family="system-ui, sans-serif" font-size="11.5" fill="#94A3B8">Pink = removed, Blue = added</text>
  </g>
</svg>
