<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4FF" />
      <stop offset="100%" stop-color="#E8EEFF" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg1)" />

  <!-- Side panel mockup -->
  <g transform="translate(340, 60)">
    <rect width="600" height="680" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 24px rgba(0,0,0,0.12))" />

    <!-- Header -->
    <rect width="600" height="48" rx="12" fill="#FFFFFF" />
    <rect y="36" width="600" height="12" fill="#FFFFFF" />
    <line x1="0" y1="48" x2="600" y2="48" stroke="#E0E0E0" stroke-width="1" />

    <!-- Toggle buttons -->
    <rect x="12" y="12" width="60" height="26" rx="4" fill="#3B82F6" />
    <text x="42" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Local</text>
    <rect x="76" y="12" width="70" height="26" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" />
    <text x="111" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Session</text>

    <!-- Search bar -->
    <rect x="156" y="12" width="432" height="26" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1" />
    <text x="170" y="29" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">Filter keys...</text>

    <!-- Keys list -->
    <rect x="0" y="48" width="180" height="632" fill="#FAFAFA" />

    <!-- Add button -->
    <text x="12" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#3B82F6" font-weight="500">+ Add new key</text>

    <!-- Key items -->
    <g font-family="system-ui, sans-serif" font-size="12" fill="#333">
      <rect x="0" y="82" width="180" height="30" fill="#EBF5FF" />
      <text x="16" y="101" font-weight="600" fill="#1E3A5F">user-settings</text>

      <text x="16" y="131">auth-token</text>
      <text x="16" y="161">theme-preference</text>
      <text x="16" y="191">cart-items</text>
      <text x="16" y="221">last-visited</text>
      <text x="16" y="251">notifications</text>
      <text x="16" y="281">feature-flags</text>
      <text x="16" y="311">session-id</text>
      <text x="16" y="341">api-cache</text>
    </g>

    <!-- Divider -->
    <line x1="180" y1="48" x2="180" y2="680" stroke="#E0E0E0" stroke-width="1" />

    <!-- Value editor header -->
    <rect x="180" y="48" width="420" height="38" fill="#FAFAFA" />
    <text x="196" y="72" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#333">user-settings</text>

    <!-- JSON toggle -->
    <rect x="460" y="56" width="14" height="14" rx="2" fill="#3B82F6" />
    <text x="478" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#333">JSON</text>

    <!-- Buttons -->
    <rect x="508" y="54" width="40" height="22" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" />
    <text x="528" y="69" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#333">Copy</text>
    <rect x="552" y="54" width="40" height="22" rx="3" fill="#22C55E" />
    <text x="572" y="69" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFF">Save</text>

    <!-- Code editor area (One Dark theme) -->
    <rect x="180" y="86" width="420" height="480" fill="#282C34" />
    <g font-family="'SF Mono', 'Fira Code', monospace" font-size="12">
      <text x="196" y="110" fill="#ABB2BF">{</text>
      <text x="210" y="130" fill="#E06C75">"language"</text><text x="290" y="130" fill="#ABB2BF">:</text><text x="300" y="130" fill="#98C379">"en"</text><text x="330" y="130" fill="#ABB2BF">,</text>
      <text x="210" y="150" fill="#E06C75">"timezone"</text><text x="294" y="150" fill="#ABB2BF">:</text><text x="304" y="150" fill="#98C379">"America/New_York"</text><text x="460" y="150" fill="#ABB2BF">,</text>
      <text x="210" y="170" fill="#E06C75">"theme"</text><text x="270" y="170" fill="#ABB2BF">:</text><text x="280" y="170" fill="#98C379">"dark"</text><text x="320" y="170" fill="#ABB2BF">,</text>
      <text x="210" y="190" fill="#E06C75">"notifications"</text><text x="330" y="190" fill="#ABB2BF">: {</text>
      <text x="230" y="210" fill="#E06C75">"email"</text><text x="280" y="210" fill="#ABB2BF">:</text><text x="290" y="210" fill="#D19A66">true</text><text x="320" y="210" fill="#ABB2BF">,</text>
      <text x="230" y="230" fill="#E06C75">"push"</text><text x="274" y="230" fill="#ABB2BF">:</text><text x="284" y="230" fill="#D19A66">false</text>
      <text x="210" y="250" fill="#ABB2BF">},</text>
      <text x="210" y="270" fill="#E06C75">"sidebar"</text><text x="282" y="270" fill="#ABB2BF">: {</text>
      <text x="230" y="290" fill="#E06C75">"width"</text><text x="280" y="290" fill="#ABB2BF">:</text><text x="290" y="290" fill="#D19A66">280</text><text x="314" y="290" fill="#ABB2BF">,</text>
      <text x="230" y="310" fill="#E06C75">"collapsed"</text><text x="314" y="310" fill="#ABB2BF">:</text><text x="324" y="310" fill="#D19A66">false</text>
      <text x="210" y="330" fill="#ABB2BF">}</text>
      <text x="196" y="350" fill="#ABB2BF">}</text>
    </g>

    <!-- Import/Export bar -->
    <rect x="0" y="580" width="600" height="36" fill="#FAFAFA" />
    <line x1="0" y1="580" x2="600" y2="580" stroke="#E0E0E0" stroke-width="1" />
    <rect x="12" y="588" width="52" height="22" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" />
    <text x="38" y="603" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#333">Export</text>
    <rect x="70" y="588" width="52" height="22" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" />
    <text x="96" y="603" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#333">Import</text>

    <!-- Recording bar -->
    <rect x="0" y="616" width="600" height="32" fill="#F8F8F8" />
    <circle cx="24" cy="632" r="4" fill="#D32F2F" />
    <text x="34" y="636" font-family="system-ui, sans-serif" font-size="11" fill="#333">Recording</text>
    <text x="540" y="636" font-family="system-ui, sans-serif" font-size="11" fill="#999">0 changes</text>
  </g>

  <!-- Feature callout -->
  <g transform="translate(80, 200)">
    <rect width="220" height="80" rx="8" fill="#1E3A5F" opacity="0.95" />
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Browse all keys</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Search and filter localStorage</text>
    <text x="20" y="68" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">and sessionStorage entries</text>
  </g>

  <!-- Arrow -->
  <line x1="300" y1="240" x2="340" y2="240" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6" />
    </marker>
  </defs>
</svg>
